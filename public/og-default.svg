<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDB913;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="150" fill="#ffffff" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#ffffff" opacity="0.1"/>
  <circle cx="950" cy="150" r="100" fill="#ffffff" opacity="0.15"/>
  
  <!-- Main Content Box -->
  <rect x="100" y="150" width="1000" height="330" rx="30" fill="#ffffff" filter="url(#shadow)"/>
  
  <!-- Icon/Logo Area -->
  <circle cx="220" cy="315" r="80" fill="#FF6B35"/>
  <text x="220" y="340" font-family="Arial, sans-serif" font-size="70" fill="#ffffff" text-anchor="middle" font-weight="bold">🔥</text>
  
  <!-- Title -->
  <text x="350" y="260" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#1a1a1a">
    ALL PRO
  </text>
  
  <!-- Subtitle -->
  <text x="350" y="330" font-family="Arial, sans-serif" font-size="42" fill="#666666">
    โปรโมชั่นเด็ดใกล้คุณ
  </text>
  
  <!-- Description -->
  <text x="350" y="390" font-family="Arial, sans-serif" font-size="32" fill="#999999">
    ค้นหาดีลสุดคุ้มทุกวัน ทุกที่ ทั่วไทย
  </text>
  
  <!-- Badge -->
  <rect x="850" y="210" width="180" height="50" rx="25" fill="#FF6B35"/>
  <text x="940" y="245" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">
    ลดสูงสุด 50%
  </text>
  
  <!-- Footer -->
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.9">
    allpro.co • แอปรวมโปรโมชั่นครบที่สุด
  </text>
</svg>
